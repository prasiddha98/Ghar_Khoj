kind = "web"
previewPath = "/"
title = "Ghar Khoj - Room Rental Nepal"
version = "1.0.0"
id = "artifacts/ghar-khoj"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18458

[services.development]
run = "pnpm --filter @workspace/ghar-khoj run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghar-khoj", "run", "build" ]
publicDir = "artifacts/ghar-khoj/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18458"
BASE_PATH = "/"
