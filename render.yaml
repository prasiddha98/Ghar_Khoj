services:
  - type: pserv
    name: rental-db
    plan: free

  - type: web
    name: rental-api
    env: node
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    plan: starter
    envVars:
    - key: DATABASE_URL
      fromDatabase:
          name: rental-db
          property: connectionString
      - key: JWT_SECRET
        value: "${JWT_SECRET}"
      - key: KHALTI_SECRET_KEY
        value: "${KHALTI_SECRET_KEY}"
      - key: KHALTI_ENV
        value: "sandbox"
      - key: KHALTI_WEB_BASE_URL
        value: "${KHALTI_WEB_BASE_URL}"

  - type: web
    name: rental-web
    buildCommand: pnpm install && pnpm --filter @workspace/ghar-khoj run build
    staticPublishPath: apps/web/dist
    plan: starter
    envVars:
      - key: VITE_API_URL
        value: "${VITE_API_URL}"
      - key: VITE_KHALTI_PUBLIC_KEY
        value: "${VITE_KHALTI_PUBLIC_KEY}"
