databases:
  - name: rental-db
    plan: free

services:
  - type: web
    name: rental-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node apps/api/dist/index.mjs
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rental-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: KHALTI_SECRET_KEY
        sync: false
      - key: KHALTI_ENV
        value: sandbox
      - key: KHALTI_WEB_BASE_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: rental-web
    env: static
    buildCommand: pnpm install && pnpm --filter @workspace/ghar-khoj run build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_KHALTI_PUBLIC_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html